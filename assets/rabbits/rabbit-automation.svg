<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" fill="none" role="img" aria-label="Automation & Agents Rabbit Mascot">
  <defs>
    <filter id="glow-aut">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <radialGradient id="body-grad-aut" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#C8E8F0"/>
      <stop offset="100%" stop-color="#A8D8EA"/>
    </radialGradient>
    <radialGradient id="glow-bg-aut" cx="50%" cy="100%" r="50%">
      <stop offset="0%" stop-color="#A8D8EA" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#A8D8EA" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <ellipse cx="100" cy="190" rx="70" ry="20" fill="url(#glow-bg-aut)"/>

  <!-- Ears with circuit lines -->
  <ellipse cx="70" cy="48" rx="15" ry="36" fill="url(#body-grad-aut)" filter="url(#glow-aut)"/>
  <ellipse cx="130" cy="48" rx="15" ry="36" fill="url(#body-grad-aut)" filter="url(#glow-aut)"/>
  <ellipse cx="70" cy="51" rx="7.5" ry="25" fill="#E8B4C0" opacity="0.7"/>
  <ellipse cx="130" cy="51" rx="7.5" ry="25" fill="#E8B4C0" opacity="0.7"/>
  <!-- Circuit traces on ears -->
  <line x1="70" y1="28" x2="70" y2="60" stroke="#C8F560" stroke-width="1" opacity="0.5"/>
  <circle cx="70" cy="38" r="2" fill="#C8F560" opacity="0.7"/>
  <circle cx="70" cy="50" r="2" fill="#C8F560" opacity="0.7"/>
  <line x1="130" y1="28" x2="130" y2="60" stroke="#C8F560" stroke-width="1" opacity="0.5"/>
  <circle cx="130" cy="38" r="2" fill="#C8F560" opacity="0.7"/>

  <!-- Body -->
  <ellipse cx="100" cy="155" rx="50" ry="54" fill="url(#body-grad-aut)" filter="url(#glow-aut)"/>

  <!-- Head -->
  <circle cx="100" cy="98" r="44" fill="url(#body-grad-aut)" filter="url(#glow-aut)"/>

  <!-- Robot visor eyes -->
  <rect x="70" y="86" width="56" height="22" rx="8" fill="#1a1a2e" opacity="0.85"/>
  <!-- LED eyes -->
  <rect x="76" y="91" width="18" height="12" rx="4" fill="#00D4FF" opacity="0.9"/>
  <rect x="106" y="91" width="18" height="12" rx="4" fill="#00D4FF" opacity="0.9"/>
  <!-- Eye scanlines -->
  <rect x="76" y="91" width="18" height="3" rx="0" fill="#008FA8" opacity="0.5"/>
  <rect x="106" y="91" width="18" height="3" rx="0" fill="#008FA8" opacity="0.5"/>
  <!-- Visor glow -->
  <rect x="70" y="86" width="56" height="22" rx="8" fill="none" stroke="#A8D8EA" stroke-width="1" opacity="0.5"/>
  <!-- Small antenna indicators -->
  <circle cx="100" cy="69" r="5" fill="#C8F560"/>
  <circle cx="100" cy="69" r="3" fill="#A0E040"/>
  <line x1="100" y1="64" x2="100" y2="54" stroke="#C8F560" stroke-width="2"/>
  <circle cx="100" cy="52" r="3" fill="#C8F560" opacity="0.8"/>

  <!-- Nose -->
  <ellipse cx="100" cy="118" rx="5" ry="3" fill="#A8D8EA"/>
  <!-- Smile (mechanical) -->
  <path d="M 88 125 L 112 125" stroke="#6B8EA8" stroke-width="2" stroke-linecap="round"/>
  <line x1="92" y1="125" x2="92" y2="128" stroke="#6B8EA8" stroke-width="1.5"/>
  <line x1="100" y1="125" x2="100" y2="128" stroke="#6B8EA8" stroke-width="1.5"/>
  <line x1="108" y1="125" x2="108" y2="128" stroke="#6B8EA8" stroke-width="1.5"/>

  <!-- Robot arm (right) -->
  <g transform="translate(145, 125)">
    <!-- Upper arm -->
    <rect x="-6" y="-25" width="12" height="28" rx="6" fill="#6B8EA8"/>
    <!-- Elbow joint with gear -->
    <circle cx="0" cy="5" r="10" fill="#4A6B8A"/>
    <circle cx="0" cy="5" r="6" fill="#3A5A7A"/>
    <!-- Gear teeth -->
    <circle cx="0" cy="-5" r="3" fill="#5A7890"/>
    <circle cx="9" cy="5" r="3" fill="#5A7890"/>
    <circle cx="-9" cy="5" r="3" fill="#5A7890"/>
    <circle cx="6" cy="-8" r="3" fill="#5A7890"/>
    <circle cx="-6" cy="-8" r="3" fill="#5A7890"/>
    <!-- Forearm -->
    <rect x="-5" y="15" width="10" height="26" rx="5" fill="#7B9EBA"/>
    <!-- Claw / hand -->
    <rect x="-10" y="38" width="8" height="14" rx="4" fill="#8AAEC8"/>
    <rect x="2" y="38" width="8" height="14" rx="4" fill="#8AAEC8"/>
  </g>

  <!-- Left arm (normal) -->
  <path d="M 66 145 Q 50 155 45 165" stroke="#A8D8EA" stroke-width="10" fill="none" stroke-linecap="round"/>
  <circle cx="45" cy="165" r="8" fill="#B8E0EC"/>

  <!-- Gear decorations -->
  <g opacity="0.6">
    <circle cx="22" cy="110" r="12" fill="none" stroke="#7B5EA7" stroke-width="2"/>
    <circle cx="22" cy="110" r="5" fill="#7B5EA7" opacity="0.5"/>
    <line x1="22" y1="96" x2="22" y2="100" stroke="#7B5EA7" stroke-width="2"/>
    <line x1="22" y1="120" x2="22" y2="124" stroke="#7B5EA7" stroke-width="2"/>
    <line x1="8" y1="110" x2="12" y2="110" stroke="#7B5EA7" stroke-width="2"/>
    <line x1="32" y1="110" x2="36" y2="110" stroke="#7B5EA7" stroke-width="2"/>
    <line x1="12" y1="100" x2="15" y2="103" stroke="#7B5EA7" stroke-width="2"/>
    <line x1="29" y1="117" x2="32" y2="120" stroke="#7B5EA7" stroke-width="2"/>
    <line x1="12" y1="120" x2="15" y2="117" stroke="#7B5EA7" stroke-width="2"/>
    <line x1="29" y1="103" x2="32" y2="100" stroke="#7B5EA7" stroke-width="2"/>
  </g>

  <!-- Tail -->
  <circle cx="55" cy="168" r="11" fill="#C8E8F5"/>

  <!-- Feet -->
  <ellipse cx="80" cy="200" rx="17" ry="8" fill="#A8D8EA"/>
  <ellipse cx="120" cy="200" rx="17" ry="8" fill="#A8D8EA"/>

  <!-- Circuit traces on body -->
  <path d="M 80 140 L 80 155 L 95 155" stroke="#C8F560" stroke-width="1" opacity="0.3" fill="none"/>
  <circle cx="80" cy="140" r="2" fill="#C8F560" opacity="0.4"/>
  <circle cx="95" cy="155" r="2" fill="#C8F560" opacity="0.4"/>
</svg>
