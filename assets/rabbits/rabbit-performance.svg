<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" fill="none" role="img" aria-label="Performance Marketing Rabbit Mascot">
  <defs>
    <filter id="glow-perf">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <radialGradient id="body-grad-perf" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#C8E8F0"/>
      <stop offset="100%" stop-color="#A8D8EA"/>
    </radialGradient>
    <radialGradient id="glow-bg-perf" cx="50%" cy="100%" r="50%">
      <stop offset="0%" stop-color="#A8D8EA" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#A8D8EA" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Glow background -->
  <ellipse cx="100" cy="190" rx="70" ry="20" fill="url(#glow-bg-perf)"/>

  <!-- Ears -->
  <ellipse cx="68" cy="52" rx="16" ry="38" fill="url(#body-grad-perf)" filter="url(#glow-perf)"/>
  <ellipse cx="132" cy="52" rx="16" ry="38" fill="url(#body-grad-perf)" filter="url(#glow-perf)"/>
  <!-- Inner ears -->
  <ellipse cx="68" cy="55" rx="8" ry="26" fill="#E8B4C0" opacity="0.7"/>
  <ellipse cx="132" cy="55" rx="8" ry="26" fill="#E8B4C0" opacity="0.7"/>

  <!-- Body -->
  <ellipse cx="100" cy="155" rx="52" ry="56" fill="url(#body-grad-perf)" filter="url(#glow-perf)"/>

  <!-- Head -->
  <circle cx="100" cy="100" r="46" fill="url(#body-grad-perf)" filter="url(#glow-perf)"/>

  <!-- Sunglasses frame -->
  <rect x="72" y="92" width="24" height="16" rx="8" fill="#1a1a2e" opacity="0.9"/>
  <rect x="104" y="92" width="24" height="16" rx="8" fill="#1a1a2e" opacity="0.9"/>
  <line x1="96" y1="100" x2="104" y2="100" stroke="#1a1a2e" stroke-width="2.5"/>
  <!-- Sunglass lenses -->
  <rect x="73" y="93" width="22" height="14" rx="7" fill="#7B5EA7" opacity="0.7"/>
  <rect x="105" y="93" width="22" height="14" rx="7" fill="#7B5EA7" opacity="0.7"/>
  <!-- Lens shine -->
  <rect x="75" y="95" width="6" height="3" rx="2" fill="white" opacity="0.4"/>
  <rect x="107" y="95" width="6" height="3" rx="2" fill="white" opacity="0.4"/>

  <!-- Nose -->
  <ellipse cx="100" cy="113" rx="5" ry="3.5" fill="#E896A8"/>
  <!-- Mouth -->
  <path d="M 94 117 Q 100 122 106 117" stroke="#C0607A" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Cheeks -->
  <ellipse cx="80" cy="115" rx="9" ry="5" fill="#F2A0B0" opacity="0.4"/>
  <ellipse cx="120" cy="115" rx="9" ry="5" fill="#F2A0B0" opacity="0.4"/>

  <!-- Rocket body -->
  <g transform="translate(118, 90) rotate(-30)">
    <!-- Rocket tube -->
    <rect x="-8" y="-30" width="16" height="44" rx="8" fill="#C8F560"/>
    <!-- Rocket nose -->
    <path d="M -8 -30 Q 0 -52 8 -30 Z" fill="#A8D8EA"/>
    <!-- Rocket window -->
    <circle cx="0" cy="-15" r="6" fill="white" opacity="0.9"/>
    <circle cx="0" cy="-15" r="4" fill="#7B5EA7"/>
    <!-- Rocket fins -->
    <path d="M -8 14 L -18 26 L -8 22 Z" fill="#A8D8EA"/>
    <path d="M 8 14 L 18 26 L 8 22 Z" fill="#A8D8EA"/>
    <!-- Rocket flame -->
    <path d="M -5 14 Q 0 32 5 14" fill="#FF8C42" opacity="0.9"/>
    <path d="M -3 14 Q 0 26 3 14" fill="#FFD700"/>
  </g>

  <!-- Arm holding rocket -->
  <path d="M 136 130 Q 145 115 138 100" stroke="#A8D8EA" stroke-width="10" fill="none" stroke-linecap="round"/>

  <!-- Paw -->
  <circle cx="137" cy="130" r="8" fill="#B8E0EC"/>

  <!-- Tail -->
  <circle cx="55" cy="170" r="12" fill="#C8E8F5"/>

  <!-- Feet -->
  <ellipse cx="80" cy="200" rx="18" ry="9" fill="#A8D8EA"/>
  <ellipse cx="120" cy="200" rx="18" ry="9" fill="#A8D8EA"/>

  <!-- Speed lines -->
  <line x1="20" y1="85" x2="55" y2="88" stroke="#C8F560" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <line x1="15" y1="95" x2="50" y2="95" stroke="#C8F560" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  <line x1="20" y1="105" x2="52" y2="103" stroke="#C8F560" stroke-width="1" stroke-linecap="round" opacity="0.3"/>
</svg>
