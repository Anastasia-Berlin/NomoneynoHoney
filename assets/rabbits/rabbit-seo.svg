<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" fill="none" role="img" aria-label="SEO & GEO Rabbit Mascot">
  <defs>
    <filter id="glow-seo">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <radialGradient id="body-grad-seo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#C8E8F0"/>
      <stop offset="100%" stop-color="#A8D8EA"/>
    </radialGradient>
    <radialGradient id="glow-bg-seo" cx="50%" cy="100%" r="50%">
      <stop offset="0%" stop-color="#A8D8EA" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#A8D8EA" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <ellipse cx="100" cy="190" rx="70" ry="20" fill="url(#glow-bg-seo)"/>

  <!-- Explorer hat -->
  <ellipse cx="100" cy="70" rx="48" ry="10" fill="#8B6914"/>
  <path d="M 60 70 Q 100 45 140 70 Z" fill="#A0791E"/>
  <ellipse cx="100" cy="70" rx="48" ry="10" fill="#8B6914"/>
  <rect x="82" y="58" width="36" height="15" rx="3" fill="#C8A020"/>

  <!-- Ears -->
  <ellipse cx="68" cy="56" rx="15" ry="32" fill="url(#body-grad-seo)" filter="url(#glow-seo)"/>
  <ellipse cx="132" cy="56" rx="15" ry="32" fill="url(#body-grad-seo)" filter="url(#glow-seo)"/>
  <ellipse cx="68" cy="59" rx="7.5" ry="22" fill="#E8B4C0" opacity="0.7"/>
  <ellipse cx="132" cy="59" rx="7.5" ry="22" fill="#E8B4C0" opacity="0.7"/>

  <!-- Body -->
  <ellipse cx="100" cy="157" rx="50" ry="54" fill="url(#body-grad-seo)" filter="url(#glow-seo)"/>

  <!-- Head -->
  <circle cx="100" cy="100" r="44" fill="url(#body-grad-seo)" filter="url(#glow-seo)"/>

  <!-- Eyes — curious/investigative -->
  <ellipse cx="84" cy="96" rx="11" ry="12" fill="white"/>
  <ellipse cx="116" cy="96" rx="11" ry="12" fill="white"/>
  <circle cx="85" cy="97" r="8" fill="#2D1B4E"/>
  <circle cx="117" cy="97" r="8" fill="#2D1B4E"/>
  <!-- Pupils looking slightly sideways -->
  <circle cx="87" cy="96" r="5" fill="#1a0f30"/>
  <circle cx="119" cy="96" r="5" fill="#1a0f30"/>
  <circle cx="88.5" cy="94" r="2" fill="white"/>
  <circle cx="120.5" cy="94" r="2" fill="white"/>

  <!-- Raised eyebrow on one side (curious look) -->
  <path d="M 74 83 Q 84 78 92 83" stroke="#8ABCCC" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M 108 83 Q 116 79 126 83" stroke="#8ABCCC" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Nose -->
  <ellipse cx="100" cy="112" rx="5" ry="3.5" fill="#E896A8"/>
  <path d="M 90 118 Q 100 126 110 118" stroke="#C0607A" stroke-width="2" fill="none" stroke-linecap="round"/>
  <ellipse cx="79" cy="113" rx="9" ry="5" fill="#F2A0B0" opacity="0.35"/>
  <ellipse cx="121" cy="113" rx="9" ry="5" fill="#F2A0B0" opacity="0.35"/>

  <!-- Magnifying glass (right arm) -->
  <g transform="translate(138, 100)">
    <!-- Handle -->
    <rect x="15" y="25" width="8" height="32" rx="4" fill="#8B6914" transform="rotate(35 19 25)"/>
    <!-- Lens ring -->
    <circle cx="0" cy="0" r="22" fill="none" stroke="#C8A020" stroke-width="5"/>
    <circle cx="0" cy="0" r="20" fill="rgba(168, 216, 234, 0.3)"/>
    <!-- Lens shine -->
    <path d="M -14 -14 Q -8 -18 -2 -14" stroke="white" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.6"/>
    <!-- Search icon inside lens -->
    <circle cx="0" cy="-2" r="8" fill="none" stroke="#7B5EA7" stroke-width="2.5"/>
    <line x1="6" y1="4" x2="12" y2="10" stroke="#7B5EA7" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- Right arm -->
  <path d="M 134 138 Q 145 125 148 112" stroke="#A8D8EA" stroke-width="10" fill="none" stroke-linecap="round"/>
  <circle cx="148" cy="112" r="7" fill="#B8E0EC"/>

  <!-- Compass (left arm / held) -->
  <g transform="translate(35, 130)">
    <circle cx="0" cy="0" r="18" fill="#1a1a2e" opacity="0.9"/>
    <circle cx="0" cy="0" r="16" fill="#252540"/>
    <!-- Compass marks -->
    <text x="-4" y="-8" font-size="6" fill="#A8D8EA" font-weight="bold">N</text>
    <text x="-3" y="14" font-size="6" fill="#6B8EA8">S</text>
    <text x="-13" y="3" font-size="6" fill="#6B8EA8">W</text>
    <text x="7" y="3" font-size="6" fill="#6B8EA8">E</text>
    <!-- Needle -->
    <path d="M 0 -12 L 3 0 L 0 4 L -3 0 Z" fill="#FF5C5C"/>
    <path d="M 0 4 L 3 0 L 0 12 L -3 0 Z" fill="#A8D8EA"/>
    <!-- Center -->
    <circle cx="0" cy="0" r="2.5" fill="#C8A020"/>
  </g>

  <!-- Left arm holding compass -->
  <path d="M 66 148 Q 55 145 48 142" stroke="#A8D8EA" stroke-width="10" fill="none" stroke-linecap="round"/>
  <circle cx="48" cy="142" r="7" fill="#B8E0EC"/>

  <!-- Small map/location pins floating -->
  <g transform="translate(24, 78)">
    <circle cx="0" cy="0" r="7" fill="#C8F560"/>
    <path d="M -7 0 Q 0 10 7 0 Q 7 -10 0 -14 Q -7 -10 -7 0 Z" fill="#C8F560"/>
    <circle cx="0" cy="0" r="3" fill="#1a1a2e"/>
  </g>
  <g transform="translate(170, 95)" opacity="0.7">
    <path d="M -5 0 Q 0 8 5 0 Q 5 -8 0 -11 Q -5 -8 -5 0 Z" fill="#7B5EA7"/>
    <circle cx="0" cy="0" r="2.5" fill="white"/>
  </g>

  <!-- Tail -->
  <circle cx="55" cy="168" r="11" fill="#C8E8F5"/>

  <!-- Feet -->
  <ellipse cx="80" cy="200" rx="17" ry="8" fill="#A8D8EA"/>
  <ellipse cx="120" cy="200" rx="17" ry="8" fill="#A8D8EA"/>

  <!-- Star sparkles for "discovery" -->
  <text x="155" y="145" font-size="12" fill="#C8F560" opacity="0.7">✦</text>
  <text x="26" y="100" font-size="8" fill="#A8D8EA" opacity="0.5">✦</text>
</svg>
