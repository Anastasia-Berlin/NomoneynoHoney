<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" fill="none" role="img" aria-label="Web Development Rabbit Mascot">
  <defs>
    <filter id="glow-web">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <radialGradient id="body-grad-web" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#C8E8F0"/>
      <stop offset="100%" stop-color="#A8D8EA"/>
    </radialGradient>
    <radialGradient id="glow-bg-web" cx="50%" cy="100%" r="50%">
      <stop offset="0%" stop-color="#A8D8EA" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#A8D8EA" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <ellipse cx="100" cy="190" rx="70" ry="20" fill="url(#glow-bg-web)"/>

  <!-- Ears -->
  <ellipse cx="70" cy="48" rx="15" ry="36" fill="url(#body-grad-web)" filter="url(#glow-web)"/>
  <ellipse cx="130" cy="48" rx="15" ry="36" fill="url(#body-grad-web)" filter="url(#glow-web)"/>
  <ellipse cx="70" cy="51" rx="7.5" ry="25" fill="#E8B4C0" opacity="0.7"/>
  <ellipse cx="130" cy="51" rx="7.5" ry="25" fill="#E8B4C0" opacity="0.7"/>

  <!-- Body -->
  <ellipse cx="100" cy="155" rx="50" ry="54" fill="url(#body-grad-web)" filter="url(#glow-web)"/>

  <!-- Head -->
  <circle cx="100" cy="98" r="44" fill="url(#body-grad-web)" filter="url(#glow-web)"/>

  <!-- Code glasses -->
  <rect x="72" y="88" width="22" height="17" rx="9" fill="white" opacity="0.95"/>
  <rect x="106" y="88" width="22" height="17" rx="9" fill="white" opacity="0.95"/>
  <!-- Lens tint -->
  <rect x="73" y="89" width="20" height="15" rx="8" fill="#A8D8EA" opacity="0.5"/>
  <rect x="107" y="89" width="20" height="15" rx="8" fill="#A8D8EA" opacity="0.5"/>
  <!-- Code symbols in lenses -->
  <text x="75" y="101" font-size="8" fill="#2D1B4E" font-family="monospace" font-weight="bold">&lt;/&gt;</text>
  <text x="109" y="101" font-size="8" fill="#2D1B4E" font-family="monospace" font-weight="bold">{ }</text>
  <!-- Bridge & arms -->
  <line x1="94" y1="96" x2="106" y2="96" stroke="#6B8EA8" stroke-width="2.5"/>
  <line x1="66" y1="96" x2="72" y2="96" stroke="#6B8EA8" stroke-width="2"/>
  <line x1="128" y1="96" x2="134" y2="96" stroke="#6B8EA8" stroke-width="2"/>
  <!-- Frame -->
  <rect x="72" y="88" width="22" height="17" rx="9" fill="none" stroke="#6B8EA8" stroke-width="1.5"/>
  <rect x="106" y="88" width="22" height="17" rx="9" fill="none" stroke="#6B8EA8" stroke-width="1.5"/>

  <!-- Eyes behind glasses (just pupils visible) -->
  <circle cx="83" cy="97" r="4" fill="#2D1B4E"/>
  <circle cx="117" cy="97" r="4" fill="#2D1B4E"/>
  <circle cx="84.5" cy="95.5" r="1.5" fill="white"/>
  <circle cx="118.5" cy="95.5" r="1.5" fill="white"/>

  <!-- Nose -->
  <ellipse cx="100" cy="110" rx="5" ry="3.5" fill="#E896A8"/>
  <path d="M 91 116 Q 100 124 109 116" stroke="#C0607A" stroke-width="2" fill="none" stroke-linecap="round"/>
  <ellipse cx="80" cy="111" rx="9" ry="5" fill="#F2A0B0" opacity="0.35"/>
  <ellipse cx="120" cy="111" rx="9" ry="5" fill="#F2A0B0" opacity="0.35"/>

  <!-- Laptop -->
  <g transform="translate(40, 150)">
    <!-- Screen lid -->
    <rect x="5" y="-30" width="80" height="52" rx="5" fill="#1a1a2e"/>
    <rect x="8" y="-27" width="74" height="46" rx="3" fill="#0d1117"/>
    <!-- Code on screen -->
    <text x="12" y="-10" font-size="5" fill="#C8F560" font-family="monospace">&lt;div class="hero"&gt;</text>
    <text x="14" y="-3" font-size="5" fill="#A8D8EA" font-family="monospace">  &lt;h1&gt;Hello World&lt;/h1&gt;</text>
    <text x="12" y="4" font-size="5" fill="#C8F560" font-family="monospace">&lt;/div&gt;</text>
    <text x="12" y="11" font-size="5" fill="#7B5EA7" font-family="monospace">const magic = true;</text>
    <text x="12" y="18" font-size="5" fill="#C8F560" font-family="monospace">// making it work</text>
    <!-- Cursor blink -->
    <rect x="56" y="8" width="4" height="7" rx="1" fill="#A8D8EA" opacity="0.9"/>
    <!-- Base/keyboard -->
    <rect x="0" y="22" width="90" height="10" rx="3" fill="#252535"/>
    <!-- Touchpad -->
    <rect x="30" y="25" width="30" height="5" rx="2" fill="#1a1a2e"/>
    <!-- Logo on lid back (decorative) -->
    <circle cx="45" cy="0" r="4" fill="#A8D8EA" opacity="0.15"/>
  </g>

  <!-- Arms holding laptop -->
  <path d="M 66 155 Q 60 165 55 170" stroke="#A8D8EA" stroke-width="10" fill="none" stroke-linecap="round"/>
  <path d="M 134 155 Q 140 165 145 170" stroke="#A8D8EA" stroke-width="10" fill="none" stroke-linecap="round"/>
  <circle cx="55" cy="170" r="7" fill="#B8E0EC"/>
  <circle cx="145" cy="170" r="7" fill="#B8E0EC"/>

  <!-- Tail -->
  <circle cx="152" cy="160" r="11" fill="#C8E8F5"/>

  <!-- Feet -->
  <ellipse cx="80" cy="200" rx="17" ry="8" fill="#A8D8EA"/>
  <ellipse cx="120" cy="200" rx="17" ry="8" fill="#A8D8EA"/>

  <!-- Floating code snippets -->
  <text x="155" y="130" font-size="11" fill="#C8F560" opacity="0.6" font-family="monospace">&lt;&gt;</text>
  <text x="22" y="125" font-size="11" fill="#7B5EA7" opacity="0.6" font-family="monospace">{}</text>
  <text x="160" y="150" font-size="9" fill="#A8D8EA" opacity="0.5" font-family="monospace">;</text>
</svg>
